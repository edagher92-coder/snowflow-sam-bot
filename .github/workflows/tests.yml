name: tests

# Runs the repo's pytest suite — the vendored skill_router tests and the Sam
# facts drift guardrail (tests/test_sam_facts_consistency.py), which fails if
# sam_replies.json contradicts the canonical price manifest. Without this the
# guardrail never actually runs.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run tests
        run: python -m pytest -q
